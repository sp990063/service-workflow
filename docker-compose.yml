services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: file:/app/data/serviceflow.db
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      LDAP_ENABLED: ${LDAP_ENABLED:-true}
      LDAP_URL: ${LDAP_URL:-ldap://ldap:389}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=admin,dc=example,dc=com}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-admin}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-dc=example,dc=com}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER:-uid={{username}}}
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - mailhog
      - ldap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend Angular App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_URL: ${API_URL:-http://backend:3000}
    ports:
      - "4200:80"
    depends_on:
      - backend

  # MailHog - SMTP server for testing
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI

  # OpenLDAP for testing
  ldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: Example Inc.
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: admin
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

volumes:
  sqlite_data:
  ldap_data:
  ldap_config:
